<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor de Blog</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">📰 Blog Manager</a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link btn btn-outline-light mx-1" href="/autores/">Autores</a>
        </li>
        <li class="nav-item">
          <a class="nav-link btn btn-outline-light mx-1" href="/articulos/">Artículos</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- CONTENIDO -->
<div class="container mt-5">

    <!-- CARD CONTENEDOR -->
    <div class="card shadow-sm">
        <div class="card-body">
            {% block content %}
            {% endblock %}
        </div>
    </div>

</div>

<!-- FOOTER -->
<footer class="text-center mt-4 mb-2 text-muted">
    <small>Proyecto Django - Gestor de Blog</small>
</footer>

</body>
</html>
