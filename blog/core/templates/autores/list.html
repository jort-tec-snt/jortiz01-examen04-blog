{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">👤 Lista de Autores</h2>

<a href="/autores/nuevo/" class="btn btn-success mb-3">+ Nuevo Autor</a>

<table class="table table-striped">
    <thead class="table-dark">
        <tr>
            <th>Nombre</th>
            <th>Email</th>
        </tr>
    </thead>

    <tbody>
        {% for a in object_list %}
        <tr>
            <td>{{ a.nombre }}</td>
            <td>{{ a.email }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="2" class="text-center">No hay autores registrados</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
